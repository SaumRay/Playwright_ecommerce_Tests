# Runs Playwright tests automatically on every push to main

name: Playwright Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Step 1: Checkout your code 
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'           

      # Step 3: Install dependencies 
      - name: Install dependencies
        run: npm ci                # ci = clean install, faster and stricter than npm install

      # Step 4: Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Step 5: Run tests
      - name: Run Playwright tests
        run: npx playwright test --project=chromium tests/login.test.js tests/inventory.test.js tests/cart.test.js tests/checkout.test.js tests/e2e.test.js
        # Tests run headless automatically in CI (no headed mode needed)

      # Step 6: Upload HTML report as artifact
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()               # always upload, even on failure
        with:
          name: playwright-report
          path: test-results/html-report/
          retention-days: 30       # report stays available for 30 days
